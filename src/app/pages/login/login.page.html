<ion-content class="ion-padding ion-text-center">
  <div class="login-container">
    <ion-icon name="water-outline" color="danger" style="font-size: 80px;"></ion-icon>
    <h1 style="color: #d32f2f; font-weight: bold;">Macro-V</h1>
    <p>Gestión de Macromedidores</p>

    <ion-card mode="ios">
      <ion-card-content>
        <ion-item lines="floating">
          <ion-label position="stacked">Usuario</ion-label>
          <ion-input [(ngModel)]="usuario" name="usuario" type="text" placeholder="admin"></ion-input>
        </ion-item>

        <ion-item lines="floating">
          <ion-label position="stacked">Contraseña</ion-label>
          <ion-input [type]="mostrarPassword ? 'text' : 'password'" [(ngModel)]="contrasena" name="contrasena"></ion-input>
          <ion-button slot="end" fill="clear" (click)="togglePassword()" style="margin-top: 15px;">
            <ion-icon slot="icon-only" [name]="mostrarPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </ion-item>

        <p *ngIf="errorMsg" style="color: red; font-size: 14px;">{{ errorMsg }}</p>

        <ion-button expand="block" color="danger" (click)="login()" [disabled]="cargando" style="margin-top: 20px;">
          <ion-spinner *ngIf="cargando" name="crescent"></ion-spinner>
          <span *ngIf="!cargando">Ingresar</span>
        </ion-button>

        <ion-button expand="block" fill="clear" color="danger" routerLink="/registro">
          ¿NO TIENES CUENTA? REGÍSTRATE AQUÍ
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
