<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Iniciar Sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container">
    <div class="logo-section">
      <ion-icon name="water-outline" size="large"></ion-icon>
      <h2>Sistema de Lecturas</h2>
    </div>

    <ion-card>
      <ion-card-content>
        <ion-item>
          <ion-label position="floating">Usuario</ion-label>
          <ion-input
            type="text"
            [(ngModel)]="usuario"
            placeholder="Ingrese su usuario"
            clearInput>
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Contraseña</ion-label>
          <ion-input
            [type]="mostrarPassword ? 'text' : 'password'"
            [(ngModel)]="contrasena"
            placeholder="Ingrese su contraseña">
          </ion-input>
          <ion-button fill="clear" slot="end" (click)="togglePassword()">
            <ion-icon [name]="mostrarPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </ion-item>

        <div class="error-message" *ngIf="errorMsg">
          <ion-text color="danger">{{ errorMsg }}</ion-text>
        </div>

        <ion-button
          expand="block"
          class="ion-margin-top"
          (click)="login()"
          [disabled]="cargando">
          <ion-spinner *ngIf="cargando" name="crescent"></ion-spinner>
          <span *ngIf="!cargando">Ingresar</span>
        </ion-button>

        <ion-button
          expand="block"
          fill="clear"
          routerLink="/registro">
          ¿No tienes cuenta? Regístrate
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
